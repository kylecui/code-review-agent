<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Agent Review{% endblock %}</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --orange: #db6d28;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      margin-bottom: 24px;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header h1 a { color: var(--text); text-decoration: none; }
    header h1 a:hover { color: var(--accent); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; font-size: 13px; color: var(--text-muted); background: var(--surface); }
    td { font-size: 14px; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pass { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-warn { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .badge-block, .badge-request_changes { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-escalate { background: rgba(219,109,40,0.15); color: var(--orange); }
    .badge-pending, .badge-classifying, .badge-collecting, .badge-normalizing,
    .badge-reasoning, .badge-deciding, .badge-publishing {
      background: rgba(88,166,255,0.15); color: var(--accent);
    }
    .badge-completed { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-failed { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-superseded { background: rgba(139,148,158,0.15); color: var(--text-muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 13px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 16px; margin-bottom: 12px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    .finding-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .finding-card h3 { font-size: 14px; margin-bottom: 8px; }
    .finding-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .empty { text-align: center; padding: 48px; color: var(--text-muted); }
    .badge-CRITICAL { background: rgba(248,81,73,0.25); color: var(--red); }
    .badge-HIGH { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-MEDIUM { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .badge-LOW { background: rgba(139,148,158,0.15); color: var(--text-muted); }
    .badge-INFO { background: rgba(88,166,255,0.10); color: var(--accent); }
    .badge-policy { background: rgba(219,109,40,0.15); color: var(--orange); }
    .info-box {
      background: rgba(88,166,255,0.08);
      border: 1px solid rgba(88,166,255,0.25);
      border-radius: 6px;
      padding: 12px 16px;
      margin: 12px 0;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .info-box strong { color: var(--accent); }
    details summary { cursor: pointer; font-size: 13px; color: var(--text-muted); }
    details summary:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="/ui/scans">Agent Review</a></h1>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
