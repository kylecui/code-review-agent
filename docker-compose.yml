services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_review
      POSTGRES_USER: agent_review
      POSTGRES_PASSWORD: agent_review_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_review"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      AGENT_REVIEW_DATABASE_URL: postgresql+asyncpg://agent_review:agent_review_dev@db:5432/agent_review

volumes:
  pgdata:
